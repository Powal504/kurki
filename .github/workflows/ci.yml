name: Kurki CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kurki
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Konfiguracja Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Nadanie uprawnień dla Maven Wrapper
        run: chmod +x mvnw

      - name: Uruchomienie testów Mavenem
        id: run-tests
        run: ./mvnw test -B

      - name: Automatyczne cofnięcie (Revert) zepsutego pusha
        if: ${{ failure() && github.event_name == 'push' }}
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"        
          echo "Testy zawiodły na gałęzi głównej! Tworzę revert commita..."
          
          git revert --no-edit HEAD 
          
          git push origin main

      - name: Logowanie do Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Budowanie i wysyłanie obrazu Docker
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/kurki-backend:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/kurki-backend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kurki-backend --all-tags
      - name: Logowanie do Azure za pomocą CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Aktualizacja Azure Container App nowym obrazem
        run: |
          az containerapp update \
              --name kurki-backend-app \
              --resource-group kurki-rg \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/kurki-backend:${{ github.sha }}           
