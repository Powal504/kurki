name: Kurki Backend CI/CD

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: kurki-backend
  RESOURCE_GROUP: kurki-rg
  DEV_CONTAINER_APP: kurki-backend-app-dev
  PROD_CONTAINER_APP: kurki-backend-app

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kurki_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kurki_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run Maven tests
        env:
          SPRING_PROFILES_ACTIVE: test
          GEMINI_API_KEY: dummy-key
          GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
        run: ./mvnw clean test -B

      - name: Show test reports after failure
        if: failure()
        run: |
          echo "=== Surefire reports ==="
          ls -la target/surefire-reports || true
          cat target/surefire-reports/*.txt || true

  build-and-push:
    name: Build and push Docker image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            .

          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy-dev:
    name: Deploy to integration
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure integration ingress
        run: |
          az containerapp ingress update \
            --name ${{ env.DEV_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --target-port 8080

      - name: Deploy backend to integration
        run: |
          az containerapp update \
            --name ${{ env.DEV_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars SERVER_PORT=8080 \
            --min-replicas 1 \
            --max-replicas 1

      - name: Show integration logs after failure
        if: failure()
        run: |
          az containerapp logs show \
            --name ${{ env.DEV_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --type console \
            --tail 200 \
            --format text || true

  deploy-prod:
    name: Deploy to production
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure production ingress
        run: |
          az containerapp ingress update \
            --name ${{ env.PROD_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --target-port 8080

      - name: Deploy backend to production
        run: |
          az containerapp update \
            --name ${{ env.PROD_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars SERVER_PORT=8080 \
            --min-replicas 1 \
            --max-replicas 1

      - name: Show production logs after failure
        if: failure()
        run: |
          az containerapp logs show \
            --name ${{ env.PROD_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --type console \
            --tail 200 \
            --format text || true