version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kurki_postgres
    restart: always
    environment:
      POSTGRES_DB: kurki_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
    container_name: kurki_backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://db:5432/kurki_db

volumes:
  postgres_data: